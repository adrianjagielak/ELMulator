; PlatformIO configuration for ELMulator
;
; Build the WaveShare ESP32-S3 CAN Bridge:
;   pio run -e waveshare-esp32s3-can
;
; Upload:
;   pio run -e waveshare-esp32s3-can -t upload
;
; Monitor serial:
;   pio device monitor -b 115200

[env:waveshare-esp32s3-can]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; WaveShare ESP32-S3-RS485-CAN pin definitions
build_flags =
    -DCAN_TX_PIN=GPIO_NUM_15
    -DCAN_RX_PIN=GPIO_NUM_16
    -DARDUINO_USB_CDC_ON_BOOT=1

; Use the CAN bridge example as the main source
build_src_filter =
    -<*>
    +<../examples/WaveShare_ESP32S3_CAN_Bridge/>
    +<../src/CANBus.cpp>

lib_deps =

; For the original Bluetooth emulator examples (ESP32 only, NOT S3)
[env:esp32-bt-emulator]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_src_filter =
    +<../examples/ESP32_Custom_ELMulator/>
    +<../src/>

; For the original WiFi emulator examples (works on ESP32 and S3)
[env:esp32-wifi-emulator]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags =
    -DUSE_WIFI=true
    -DBLUETOOTH_BUILTIN=false

build_src_filter =
    +<../examples/ESP32_Wifi_Custom_ELMulator/>
    +<../src/>
